server:
  servlet:
    context-path: /RMBTControlServer
spring:
  # Default profile - used when spring.profiles.active is not set
  main:
    allow-bean-definition-overriding: true
  application:
    name: rtr-control-backend
  datasource:
    poolSize: 20
    minIdle: 1
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${CONTROL_DB_HOST:127.0.0.1}:${CONTROL_DB_PORT:5432}/${CONTROL_DB_NAME:rmbt}
    username: ${CONTROL_DB_USER:rmbt_control}
    # intellig: set pw in environment, e.g. STATISTIC_DB_PASSWORD=pwwithoutquotes
    password: ${CONTROL_DB_PASSWORD}
#    tomcat:
#      test-while-idle: true
#      test-on-borrow: true
#      validation-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  jackson:
    default-property-inclusion: non_null
# used in src/main/java/at/rtr/rmbt/service/impl/QosMeasurementServiceImpl.java
RMBT_SECRETKEY: RMBT_SECRETKEY

auth0:
  issuer: https://auth.a2332751-f1b8-4d26-8291.example.com
  apiAudience: https://example.com
origin: ${CONTROL_ALLOWED_ORIGIN:*}
app:
  rmbt:
    accuracyDetailLimit: 10000
    accuracyButtonLimit: 2000
    version: 0.1.0 || 0.3.0 || ^1.0.0
    language:
      supportedLanguages:
        - de
        - en
        - hr
        - sv
        - pl
        - es
        - is
        - fr
        - nb
        - cs
      defaultLanguage: en
    clientNames:
      - RMBT
      - RMBTjs
      - Open-RMBT
      - RMBTws
      - HW-PROBE
      - RTR-Netztest
      - RMBTel
application-version:
  host: rtr-control-default
  server-url: ${CONTROL_SERVER_URL:http://127.0.0.1:8080/RMBTControlServer}

client-tenant:
  clientTenantMapping:
    rtr: rtr
  defaultTenant: rtr

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    poolSize: 20
    minIdle: 1
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${CONTROL_DB_HOST:127.0.0.1}:${CONTROL_DB_PORT:5432}/${CONTROL_DB_NAME:rmbt}
    username: ${CONTROL_DB_USER:rmbt_control}
    password: ${CONTROL_DB_PASSWORD}
#    tomcat:
#      test-while-idle: true
#      test-on-borrow: true
#      validation-query: SELECT 1

client-tenant:
  clientTenantMapping:
    rtr: rtr_dev
  defaultTenant: rtr

application-version:
  host: rtr-control-dev
  server-url: ${CONTROL_SERVER_URL:http://127.0.0.1:8080/RMBTControlServer}

---
spring:
  config:
    activate:
      # production profile - activate by adding "spring.profiles.active=prod" to "catalina.properties"
      on-profile: prod

  datasource:
    poolSize: 20
    minIdle: 1
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${CONTROL_DB_HOST:127.0.0.1}:${CONTROL_DB_PORT:5432}/${CONTROL_DB_NAME:rmbt}
    username: ${CONTROL_DB_USER:rmbt_control}
    password: ${CONTROL_DB_PASSWORD}
#    tomcat:
#      test-while-idle: true
#      test-on-borrow: true
#      validation-query: SELECT 1

application-version:
  host: ${HOST_ID:rtr-control-prod}
  server-url: ${CONTROL_SERVER_URL:http://127.0.0.1:8080/RMBTControlServer}

logging:
    config: ${LOGGING_CONFIG_FILE:classpath:logback-local.xml}
origin: ${CONTROL_ALLOWED_ORIGIN:https://www.netztest.at}

server:
  address: 0.0.0.0
  port: 8080  # Optional: specify the port if different from the default 8080
